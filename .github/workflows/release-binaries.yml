name: Release Binaries

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: kindle-to-markdown-x86_64-unknown-linux-gnu.tar.gz
            binary_name: kindle-to-markdown
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: kindle-to-markdown-aarch64-apple-darwin.tar.gz
            binary_name: kindle-to-markdown
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: kindle-to-markdown-x86_64-pc-windows-msvc.zip
            binary_name: kindle-to-markdown.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          tar -C dist -czf ${{ matrix.archive_name }} ${{ matrix.binary_name }}

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
