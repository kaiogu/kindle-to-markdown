default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: cargo-test
        name: cargo test
        entry: cargo test --all-targets --all-features
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: conventional-commit
        name: conventional commit message
        entry: bash scripts/check-commit-message.sh
        language: system
        stages: [commit-msg]
