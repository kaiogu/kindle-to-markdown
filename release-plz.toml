[workspace]
# This project is released as a git-tagged GitHub release, not as a crates.io package.
git_only = true
publish = false
release_always = false
git_release_enable = true
git_release_latest = true
semver_check = false

# While the project is < 1.0.0, only product changes should trigger release PRs.
release_commits = "^(feat|fix|perf|refactor)(\\([a-z0-9._/-]+\\))?(!)?: "
features_always_increment_minor = false
pr_labels = ["release"]

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]
"""
protect_breaking_commits = true
